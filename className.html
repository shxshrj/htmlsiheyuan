<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
	</body>
	<script type="text/javascript">
		
		class People{
			constructor(name) {
				this.name= name;
			}
			eat(food){
				console.info(`${this.name}正在吃${food}`)
			}
		}
		class Student extends People {
			constructor (name, number) {
				super(name)
				this.number = number
			}
			study(course){
				console.log(`hello, ${this.name}正在学习 ${course}`)
			}
		}
		class Teacher extends People {
			constructor (name, major) {
				super(name)
				this.major = major
			}
			teach(){
				console.log(`hello, ${this.name}正在教 ${this.major}`)
			}
		}
		let LiuHong = new Student('刘红', '10902');
		LiuHong.study('英语');
		const zhangYuan= new Teacher('张媛','数学');
		zhangYuan.teach()
	</script>
</html>

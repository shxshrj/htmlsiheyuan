<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
	</body>
	<script>
		function updataView() {
			console.log('更新视图')
		}
		const oldPrototype = Array.prototype;
		const newProto = Object.create(oldPrototype);
		['push', 'pop','shift', 'unshift', 'splice'].forEach(methodName => {
			newProto[methodName] = function(){
				updataView();
				oldPrototype[methodName].call(this, ...arguments)
			}
		})
		function defineReactive(obj, key, value){
			observerObj(value)
			Object.defineProperty(obj,key,{
				get(){
					return value
				},
				set(newValue){
					if(newValue !== value){
						observerObj(newValue);
						value = newValue;
						updataView()
					}
				}
			})
		}
		function observerObj(obj){
			if(typeof obj !== 'object' || obj == null) {
				return obj;
			}
			if(Array.isArray(obj)){
				obj.__proto__ = newProto;
			}
			for (let key in obj) {
				defineReactive(obj,key,obj[key])
			}
		}
		
		// 准备数据
		const data = {
		    name: 'zhangsan',
		    age: 20,
		    info: {
		        address: '北京' // 需要深度监听
		    },
		    nums: [10, 20, 30]
		}
		
		// 监听数据
		observerObj(data)
		
		// 测试
		data.name = 'lisi'
		// data.age = 21
		// // console.log('age', data.age)
		// data.x = '100' // 新增属性，监听不到 —— 所以有 Vue.set
		// delete data.name // 删除属性，监听不到 —— 所有已 Vue.delete
		// data.info.address = '上海' // 深度监听
		data.nums.push(4) // 监听数组
		
		
	</script>
</html>

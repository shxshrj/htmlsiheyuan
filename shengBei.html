<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style>
				
			*{
				margin: 0;
				padding:0;
			}
			.float-left{
				float: left;
			}
			.section{
				padding-left: 100px;
				padding-right: 200px;
			}
			.article{
				background-color: #ccc;
				width: 100%;
				height:100%;
			}
			.left{
				position: relative;
				background-color: yellow;
				width: 100px;
				margin-left: -100%;
				right: 100px;
			}
			.right{
				background-color: red;
				width: 200px;
				margin-right: -200px;
			}
			.clearfix::after{
				display: table;
				content: ' ';
				clear: both;
			}
		</style>
	</head>
	<body>
		<header> 标题</header>
		<div class="section clearfix" >
			<article class="float-left article ">中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间中间</article>
			<aside class="left float-left">左边</aside>
			<aside class="float-left right">右边</aside>
		</div>
		<footer>底部</footer>
	</body>
</html>

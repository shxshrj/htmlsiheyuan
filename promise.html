		class MyPromise1{
			state= 'pending';
			value = undefined;
			reason = undefined;
			resolveCallbacks = []; // pending状态下，存储成功的回调
			rejectCallbacks = []; // pendding 状态下，存储失败的回调
			constructor(fn) {
			    const resolveHandler = value=>{
					if(this.state === 'pending') {
						this.state = 'fullfilled';
						this.value = value;
						console.log(this.resolveCallbacks)
						this.resolveCallbacks.forEach(func=>{
							func(this.value)
						})
					}
				}
				const rejectHandler = reason=>{
					if(this.state === 'pending') {
						this.state = 'reject';
						this.reason = reason;
						this.rejectCallbacks.forEach(func=>{
							func(this.reason)
						})
					}
				}
				fn(resolveHandler, rejectHandler)
			}
			then(fn1,fn2){
				fn1 = typeof fn1 === 'function' ? fn1 : (v)=>v;
				fn2 = typeof fn2 === 'function' ? fn2 : (e)=>e;
				if(this.state === 'pending') {
					return new MyPromise1((resolve, reject) => {
						this.resolveCallbacks.push(()=>{
							try {
								const newValue = fn1(this.value);
								resolve(newValue)
							} catch (error) {
								reject(error)
							}
						})
						this.rejectCallbacks.push(()=>{
							try {
								const newReason = fn2(this.reason);
								reject(newReason)
							} catch (error) {
								//TODO handle the exception
								reject(error)
							}
						})
					})
				}
				if(this.state === 'fullfilled') {
					return new MyPromise1((resolve, reject) => {
						this.resolveCallbacks.push(()=>{
							try {
								const newValue = fn1(this.value)
								resolve(newValue)
							} catch (error) {
								//TODO handle the exception
								reject(error)
							}
						})
						
					})
				}
				if(this.state === 'reject') {
					return new MyPromise1((resolve,reject) => {
						this.rejectCallbacks.push(()=>{
							try {
								const newReason = fn2(this.reason);
								reject(newReason)
							} catch (error) {
								//TODO handle the exception
								reject(newReason)
							}
						})
					})
				}
			}
			catch(fn){
				return this.then(null, fn)
			}
		}
		MyPromise1.resolve = function(value){
			return new MyPromise1((resolve, reject) => {
				resolve(value)
			})
		}
		MyPromise1.reject = function(reason){
			return new MyPromise1((reason,reject) => {
				reject(reason)
			})
		}
		MyPromise1.all = function(promisList = []) {
			const p1 = new MyPromise1((resolve,reject)=>{
				const result = [];
				const length = promisList.length;
				let resolveCount = 0;
				promisList.forEach((p,index)=>{
					p.then(data=>{
						result[index] = data;
						resolveCount ++;
						if(length === resolveCount) {
							resolve(result);
						}
					}).catch(err=>{
						reject(err);
					})
				})
			})
			return p1;
		}
		MyPromise1.race = function(promisList = []) {
			let resolveFlag = false;
			const p1 = new MyPromise1((resolve, reject) => {
				promisList.forEach(p=>{
					p.then(data => {
						if(!resolveFlag){
							resolveFlag = true;
							resolve(data);
						}
						
					}).catch(err=>{
						reject(err)
					})
				})
			})
			return p1
		}
		const f1 = new MyPromise1((resolve,reject) => {
			setTimeout(()=>{
				resolve(5000)
			},5000)
		})
		const f2 = new MyPromise1((resolve,reject) => {
			setTimeout(()=>{
				resolve(4000)
			},4000)
		})
		const f3 = new MyPromise1((resolve,reject) => {
			setTimeout(()=>{
				resolve(3000)
			},3000)
		})
		MyPromise1.all([f1, f2, f3]).then(data=>{
			console.log('all', data)
		})

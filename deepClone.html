	<script type="text/javascript">
		function deepClone1(obj={}) {
			if(typeof obj !=='object' || obj ==null) {
				return obj
			}
			let result = obj instanceof Array?[]:{};
			for(let key in obj){
				if (obj.hasOwnProperty(key)){
					result[key] = deepClone1(obj[key]);
				}
			}
			return result
		}
		let luky = {
			id:1,
			name:'luky',
			schoolName: 'buzheng',
			famaly:[
				'father','mother','young sister'
			]
		}
		let lukySiter= deepClone1(luky);
		lukySiter.name= 'lucky'
		console.log(lukySiter)
		console.log(luky)
		
		function deepClone2(obj = {}, comparMap = new WeakMap()){
			if(typeof obj !== 'object' || obj == null) return obj;
			if(comparMap.get(obj)) return comparMap.get(obj);
			let result = obj instanceof Array? []:{};
			comparMap.set(obj,result);
			console.log(comparMap)
			for (let key in obj) {
				if(obj.hasOwnProperty(key)) {
					result[key] = deepClone2(obj[key],comparMap)
				}
			}
			return result
		}
